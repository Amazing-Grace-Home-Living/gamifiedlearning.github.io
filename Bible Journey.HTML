<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #fdfcf0; text-align: center; padding: 20px; color: #333; }
        .card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .btn { display: block; width: 100%; margin: 10px 0; padding: 12px; background: #5d4037; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn:hover { background: #795548; }
    </style>
</head>
<body>
    <div class="card" id="quiz-box">
        <h3>The Bible Journey</h3>
        <p id="q-text"></p>
        <div id="q-options"></div>
    </div>
    <script>
        const qData = [
            { q: "Who built the ark?", a: ["Moses", "Noah", "David"], c: 1 },
            { q: "What is the first book of the Bible?", a: ["Exodus", "Genesis", "Psalms"], c: 1 },
            { q: "How many disciples did Jesus have?", a: ["10", "12", "7"], c: 1 }
        ];
        let idx = 0;
        function loadQ() {
            if(idx >= qData.length) {
                document.getElementById('quiz-box').innerHTML = "<h3>Journey Complete!</h3><button class='btn' onclick='location.reload()'>Restart</button>";
                return;
            }
            document.getElementById('q-text').innerText = qData[idx].q;
            const opt = document.getElementById('q-options');
            opt.innerHTML = '';
            qData[idx].a.forEach((o, i) => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = o;
                b.onclick = () => { if(i === qData[idx].c) { idx++; loadQ(); } else { alert("Try again!"); } };
                opt.appendChild(b);
            });
        }
        loadQ();
    </script>
</body>
</html>
